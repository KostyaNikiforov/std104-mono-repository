<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store — Home</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/common.js"></script>
</head>

<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="global-alerts" class="global-alerts" role="status" aria-live="polite"></div>

    <header class="site-header" id="site-header"></header>

    <main id="main-content">
        <section class="hero" id="hero-root" aria-label="Featured"></section>

        <section class="products-section" aria-labelledby="products-heading">
            <div class="section-head">
                <h1 id="products-heading" class="section-title">Catalog</h1>
            </div>
            <div id="products-grid" class="products-grid"></div>
        </section>

        <section class="info-region" id="info-sections-root" aria-label="Store information"></section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="scripts/home.js"></script>
</body>

</html>
